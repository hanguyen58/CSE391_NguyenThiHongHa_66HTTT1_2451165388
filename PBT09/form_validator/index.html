<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validator - Phiếu Bài Tập 09</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>ĐĂNG KÝ TÀI KHOẢN</h2>
        <form id="regForm" novalidate>
            <div class="form-group">
                <label for="name">Họ và tên</label>
                <input type="text" id="name" placeholder="Nhập họ và tên (2-50 ký tự)">
                <div class="error-msg"></div>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Ví dụ: nguyenvan@gmail.com">
                <div class="error-msg"></div>
            </div>

            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" placeholder="Nhập mật khẩu">
                <div class="strength-container">
                    <div id="strengthBar" class="strength-bar"></div>
                </div>
                <div class="error-msg"></div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Xác nhận mật khẩu</label>
                <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu">
                <div class="error-msg"></div>
            </div>

            <div class="form-group">
                <label for="phone">Số điện thoại</label>
                <input type="text" id="phone" placeholder="Nhập số điện thoại (10 chữ số)">
                <div class="error-msg"></div>
            </div>

            <button type="submit" id="submitBtn" disabled>Đăng ký ngay</button>
        </form>
    </div>

    <script src="app.js"></script>
</body>
</html>
