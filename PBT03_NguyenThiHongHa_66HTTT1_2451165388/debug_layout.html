<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Layout</title>
    <link rel="stylesheet" href="debug_layout.css">
</head>
<body>

    <h1>Layout lỗi</h1>

    <div class="container broken">
        <div class="sidebar">
            Sidebar
        </div>

        <div class="content">
            Content
        </div>
    </div>

    <div class="clear"></div>

    <h1>Sửa bằng border-box</h1>

    <div class="container fixed-border-box">
        <div class="sidebar">
            Sidebar
        </div>

        <div class="content">
            Content
        </div>
    </div>

    <div class="clear"></div>

    <h1>Sửa không dùng border-box</h1>

    <div class="container fixed-manual">
        <div class="sidebar">
            Sidebar
        </div>

        <div class="content">
            Content
        </div>
    </div>

    <div class="clear"></div>

</body>
</html>
