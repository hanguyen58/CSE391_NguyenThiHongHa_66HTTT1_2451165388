<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model Lab</title>

    <link rel="stylesheet" href="boxmodel.css">
</head>
<body>

    <h1>So sánh Content-box và Border-box</h1>

    <section class="demo-section">

        <div class="box content-box">
            <h2>Content-box</h2>

            <p>
                width: 300px<br>
                padding: 20px<br>
                border: 5px
            </p>
        </div>

        <div class="box border-box">
            <h2>Border-box</h2>

            <p>
                width: 300px<br>
                padding: 20px<br>
                border: 5px
            </p>
        </div>

    </section>

    <hr>

    <h1>Layout 3 Cột</h1>

    <section class="layout">

        <aside class="sidebar">
            <h3>Sidebar</h3>
            <p>Menu bên trái</p>
        </aside>

        <main class="content">
            <h3>Nội dung chính</h3>
            <p>
                Đây là phần content ở giữa.
            </p>
        </main>

        <aside class="ads">
            <h3>Ads</h3>
            <p>Quảng cáo</p>
        </aside>

    </section>

</body>
</html>
