<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Sinh Viên</title>
    <link rel="stylesheet" href="Bài1.css">
</head>
<body>
    <div class="container">
        <h1>HỆ THỐNG QUẢN LÝ SINH VIÊN</h1>

        <!-- Khu vực hiển thị thông báo động -->
        <div id="toast-notification" class="toast hidden"></div>

        <!-- Khu vực thống kê -->
        <div class="statistics-card">
            <div class="stat-item">
                <span class="stat-label">Tổng số sinh viên:</span>
                <span id="total-students" class="stat-value">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Điểm trung bình lớp:</span>
                <span id="average-gpa" class="stat-value">0.0</span>
            </div>
        </div>

        <div class="action-bar">
            <button id="btn-open-modal" class="btn btn-primary">Thêm Sinh Viên Mới</button>
        </div>

        <!-- Bảng hiển thị danh sách -->
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Mã SV</th>
                        <th>Họ và Tên</th>
                        <th>Ngày Sinh</th>
                        <th>Lớp Học</th>
                        <th>Điểm TB</th>
                        <th>Email</th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody id="student-table-body">        
                </tbody>
            </table>
        </div>
    </div>

    <div id="student-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Thêm Sinh Viên Mới</h2>
                <span id="btn-close-modal" class="close-btn">&times;</span>
            </div>
            <form id="student-form" novalidate>
                <input type="hidden" id="form-mode" value="create">
                
                <div class="form-group">
                    <label for="student-id">Mã Sinh Viên <span class="required">*</span></label>
                    <input type="text" id="student-id" placeholder="Ví dụ: 2451168598">
                    <small class="error-msg"></small>
                </div>

                <div class="form-group">
                    <label for="student-name">Họ và Tên <span class="required">*</span></label>
                    <input type="text" id="student-name" placeholder="Nhập đầy đủ họ tên">
                    <small class="error-msg"></small>
                </div>

                <div class="form-group">
                    <label for="student-dob">Ngày Sinh <span class="required">*</span></label>
                    <input type="date" id="student-dob">
                    <small class="error-msg"></small>
                </div>

                <div class="form-group">
                    <label for="student-class">Lớp Học <span class="required">*</span></label>
                    <input type="text" id="student-class" placeholder="Ví dụ: 66HTTT1">
                    <small class="error-msg"></small>
                </div>

                <div class="form-group">
                    <label for="student-gpa">Điểm Trung Bình <span class="required">*</span></label>
                    <input type="number" id="student-gpa" step="0.1" min="0" max="10" placeholder="Thang điểm 10">
                    <small class="error-msg"></small>
                </div>

                <div class="form-group">
                    <label for="student-email">Email <span class="required">*</span></label>
                    <input type="email" id="student-email" placeholder="example@gmail.com">
                    <small class="error-msg"></small>
                </div>

                <div class="modal-footer">
                    <button type="button" id="btn-cancel-form" class="btn btn-secondary">Hủy bỏ</button>
                    <button type="submit" class="btn btn-success">Lưu Lại</button>
                </div>
            </form>
        </div>
    </div>
<script src="Bài1.js"></script>
</body>
</html>
